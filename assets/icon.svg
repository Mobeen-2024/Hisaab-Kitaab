<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>

    <!-- Blue Glow Effect -->
    <radialGradient id="blueGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0" />
    </radialGradient>

    <!-- Emerald Glow Effect -->
    <radialGradient id="emeraldGlow" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#10B981" stop-opacity="0" />
    </radialGradient>

    <!-- Logo Primary Gradient (Blue to Cyan) -->
    <linearGradient id="logoPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <!-- Logo Secondary Gradient (Emerald) -->
    <linearGradient id="logoSecondary" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>

    <!-- Drop Shadow for 3D effect -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Base App Icon Shape (Rounded Square) -->
  <rect width="512" height="512" rx="115" fill="url(#bgGradient)" />
  
  <!-- Glowing Ambient Backgrounds -->
  <rect width="512" height="512" rx="115" fill="url(#blueGlow)" />
  <rect width="512" height="512" rx="115" fill="url(#emeraldGlow)" />

  <!-- Inner Subtle Border -->
  <rect width="510" height="510" x="1" y="1" rx="114" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

  <!-- Center Logo Group -->
  <g transform="translate(128, 128)" filter="url(#dropShadow)">
    
    <!-- Left Pillar (H - left) -->
    <path d="M 32 40 C 32 24, 48 24, 64 24 L 80 24 C 96 24, 96 40, 96 56 L 96 200 C 96 216, 80 216, 64 216 L 48 216 C 32 216, 32 200, 32 184 Z" fill="url(#logoPrimary)" />

    <!-- Right Pillar (H - right & K stem) -->
    <path d="M 160 40 C 160 24, 176 24, 192 24 L 208 24 C 224 24, 224 40, 224 56 L 224 200 C 224 216, 208 216, 192 216 L 176 216 C 160 216, 160 200, 160 184 Z" fill="url(#logoPrimary)" />

    <!-- Center Bridge (H crossbar flowing into an upward graph arrow) -->
    <path d="M 64 136 C 64 120, 192 120, 192 136 C 192 152, 64 152, 64 136 Z" fill="url(#logoPrimary)" />

    <!-- Abstract Growth Arrow (K - upper arm & financial growth indicator) -->
    <path d="M 192 136 L 248 80 C 260 68, 276 68, 284 80 L 300 96 C 312 108, 312 124, 300 136 L 232 204 C 220 216, 192 216, 192 204 Z" fill="url(#logoSecondary)" />

    <!-- Accent Dot (Represents digital coin/wealth) -->
    <circle cx="270" cy="40" r="16" fill="url(#logoSecondary)" />

  </g>
</svg>
